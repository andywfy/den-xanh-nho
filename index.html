<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蓝灯 - 充电桩控制中心</title>
    <!-- 原项目统一风格样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        /* 顶部导航栏（和admin/payment页面保持一致） */
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
        }
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar .nav-links a:hover {
            color: #3498db;
        }
        /* 主体容器（清爽风格，和原项目匹配） */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .page-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .status-bar {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .status-bar .status {
            font-size: 16px;
            font-weight: bold;
        }
        .status.online {
            color: #27ae60;
        }
        .status.offline {
            color: #e74c3c;
        }
        .control-panel {
            background-color: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .settings-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .settings-group label {
            font-weight: bold;
            font-size: 16px;
        }
        .settings-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            width: 100px;
        }
        .port-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .port-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            text-align: center;
        }
        .port-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .port-status {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
            transition: background-color 0.3s;
        }
        .btn-start {
            background-color: #27ae60;
            color: white;
        }
        .btn-start:hover {
            background-color: #219653;
        }
        .btn-stop {
            background-color: #e74c3c;
            color: white;
        }
        .btn-stop:hover {
            background-color: #c0392b;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .log-panel {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .log-panel h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .log-content {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 14px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 3px;
        }
        .log-info {
            color: #3498db;
        }
        .log-success {
            color: #27ae60;
        }
        .log-error {
            color: #e74c3c;
        }
        /* 底部版权（和原项目保持一致） */
        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航（和admin/payment/merchant页面链接完全一致） -->
    <div class="navbar">
        <div class="logo">小蓝灯 充电桩管理系统</div>
        <div class="nav-links">
            <a href="index.html" style="color: #3498db;">首页</a>
            <a href="admin.html">管理后台</a>
            <a href="payment.html">支付中心</a>
            <a href="merchant.html">商家入口</a>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">充电桩控制中心</h1>

        <!-- 服务状态显示 -->
        <div class="status-bar">
            <div class="status online">✅ 服务状态：已连接到后端服务（Render部署）</div>
        </div>

        <!-- 基础设置 -->
        <div class="control-panel">
            <div class="settings-group">
                <label for="defaultDuration">默认充电时长：</label>
                <input type="number" id="defaultDuration" value="60" min="1" max="1440">
                <span>分钟</span>
            </div>
        </div>

        <!-- 端口控制区 -->
        <div class="port-grid">
            <div class="port-card">
                <div class="port-title">端口 1</div>
                <div class="port-status" id="status-1">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(1)">启动充电</button>
                <button class="btn btn-stop" onclick="stopPort(1)">停止充电</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 2</div>
                <div class="port-status" id="status-2">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(2)">启动充电</button>
                <button class="btn btn-stop" onclick="stopPort(2)">停止充电</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 3</div>
                <div class="port-status" id="status-3">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(3)">启动充电</button>
                <button class="btn btn-stop" onclick="stopPort(3)">停止充电</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 4</div>
                <div class="port-status" id="status-4">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(4)">启动充电</button>
                <button class="btn btn-stop" onclick="stopPort(4)">停止充电</button>
            </div>
        </div>

        <!-- 操作日志 -->
        <div class="log-panel">
            <h3>操作日志</h3>
            <div class="log-content" id="logs">
                <div class="log-entry log-info">[系统] 控制中心已就绪，可开始操作</div>
            </div>
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        <p>© 2026 小蓝灯充电桩管理系统 | 技术支持：越南分部</p>
    </div>

    <script>
        // 后端API地址（你的Render服务地址，已配置好）
        const API_BASE_URL = "https://charger-control-api.onrender.com";

        // 添加日志
        function addLog(message, type = "info") {
            const logsDiv = document.getElementById("logs");
            const logEntry = document.createElement("div");
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // 更新端口状态
        function updatePortStatus(port, status) {
            document.getElementById(`status-${port}`).textContent = `状态：${status}`;
        }

        // 启动端口
        async function startPort(port) {
            const duration = document.getElementById("defaultDuration").value;
            addLog(`收到启动请求：端口${port}，时长${duration}分钟`);
            updatePortStatus(port, "启动中...");

            try {
                const response = await fetch(`${API_BASE_URL}/api/start`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ port: port, duration: duration })
                });

                const result = await response.json();
                if (result.success) {
                    addLog(`✅ 端口${port}启动成功！`, "success");
                    updatePortStatus(port, "充电中");
                } else {
                    addLog(`❌ 端口${port}启动失败：${result.error || "未知错误"}`, "error");
                    updatePortStatus(port, "启动失败");
                }
            } catch (error) {
                addLog(`❌ 请求失败：${error.message}`, "error");
                updatePortStatus(port, "请求失败");
            }
        }

        // 停止端口
        async function stopPort(port) {
            addLog(`收到停止请求：端口${port}`);
            updatePortStatus(port, "停止中...");

            try {
                const response = await fetch(`${API_BASE_URL}/api/stop`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ port: port })
                });

                const result = await response.json();
                if (result.success) {
                    addLog(`✅ 端口${port}停止成功！`, "success");
                    updatePortStatus(port, "已停止");
                } else {
                    addLog(`❌ 端口${port}停止失败：${result.error || "未知错误"}`, "error");
                    updatePortStatus(port, "停止失败");
                }
            } catch (error) {
                addLog(`❌ 请求失败：${error.message}`, "error");
                updatePortStatus(port, "请求失败");
            }
        }

        // 页面加载初始化
        window.onload = function() {
            addLog("系统初始化完成，已连接到后端服务", "success");
        };
    </script>
</body>
</html>
