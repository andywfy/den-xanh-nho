<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蓝灯 - 充电桩控制中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        .status {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .status.online {
            color: #4CAF50;
        }
        .status.offline {
            color: #f44336;
        }
        .settings {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .settings label {
            display: inline-block;
            margin-right: 15px;
            font-weight: bold;
        }
        .settings input {
            padding: 8px;
            border: none;
            border-radius: 4px;
            width: 80px;
            font-size: 16px;
        }
        .ports {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .port-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .port-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .port-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .port-status {
            margin-bottom: 15px;
            font-size: 14px;
            color: #ccc;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        .btn-start {
            background-color: #4CAF50;
            color: white;
        }
        .btn-start:hover {
            background-color: #45a049;
        }
        .btn-stop {
            background-color: #f44336;
            color: white;
        }
        .btn-stop:hover {
            background-color: #d32f2f;
        }
        .btn:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        .logs {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
        }
        .log-info {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .log-success {
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .log-error {
            color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 小蓝灯 - 充电桩控制中心</h1>
        
        <div class="status online">✅ 服务状态：已连接到Render后端</div>
        
        <div class="settings">
            <label for="defaultDuration">默认充电时长（分钟）：</label>
            <input type="number" id="defaultDuration" value="60" min="1" max="1440">
        </div>

        <div class="ports">
            <div class="port-card">
                <div class="port-title">端口 1</div>
                <div class="port-status" id="status-1">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(1)">启动</button>
                <button class="btn btn-stop" onclick="stopPort(1)">停止</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 2</div>
                <div class="port-status" id="status-2">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(2)">启动</button>
                <button class="btn btn-stop" onclick="stopPort(2)">停止</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 3</div>
                <div class="port-status" id="status-3">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(3)">启动</button>
                <button class="btn btn-stop" onclick="stopPort(3)">停止</button>
            </div>
            <div class="port-card">
                <div class="port-title">端口 4</div>
                <div class="port-status" id="status-4">状态：待机</div>
                <button class="btn btn-start" onclick="startPort(4)">启动</button>
                <button class="btn btn-stop" onclick="stopPort(4)">停止</button>
            </div>
        </div>

        <h3 style="margin-bottom:10px;">操作日志</h3>
        <div class="logs" id="logs">
            <div class="log-entry log-info">[系统] 控制中心已就绪，可开始操作</div>
        </div>
    </div>

    <script>
        // 后端API地址（你的Render服务地址）
        const API_BASE_URL = "https://charger-control-api.onrender.com";

        // 添加日志
        function addLog(message, type = "info") {
            const logsDiv = document.getElementById("logs");
            const logEntry = document.createElement("div");
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // 更新端口状态
        function updatePortStatus(port, status) {
            document.getElementById(`status-${port}`).textContent = `状态：${status}`;
        }

        // 启动端口
        async function startPort(port) {
            const duration = document.getElementById("defaultDuration").value;
            addLog(`收到启动请求：端口${port}，时长${duration}分钟`);
            updatePortStatus(port, "启动中...");

            try {
                const response = await fetch(`${API_BASE_URL}/api/start`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ port: port, duration: duration })
                });

                const result = await response.json();
                if (result.success) {
                    addLog(`✅ 端口${port}启动成功！`, "success");
                    updatePortStatus(port, "充电中");
                } else {
                    addLog(`❌ 端口${port}启动失败：${result.error || "未知错误"}`, "error");
                    updatePortStatus(port, "启动失败");
                }
            } catch (error) {
                addLog(`❌ 请求失败：${error.message}`, "error");
                updatePortStatus(port, "请求失败");
            }
        }

        // 停止端口
        async function stopPort(port) {
            addLog(`收到停止请求：端口${port}`);
            updatePortStatus(port, "停止中...");

            try {
                const response = await fetch(`${API_BASE_URL}/api/stop`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ port: port })
                });

                const result = await response.json();
                if (result.success) {
                    addLog(`✅ 端口${port}停止成功！`, "success");
                    updatePortStatus(port, "已停止");
                } else {
                    addLog(`❌ 端口${port}停止失败：${result.error || "未知错误"}`, "error");
                    updatePortStatus(port, "停止失败");
                }
            } catch (error) {
                addLog(`❌ 请求失败：${error.message}`, "error");
                updatePortStatus(port, "请求失败");
            }
        }

        // 页面加载时初始化
        window.onload = function() {
            addLog("系统初始化完成，已连接到后端服务", "success");
        };
    </script>
</body>
</html>
