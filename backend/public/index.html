<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Light - Charging</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { background: #0a0a0a; min-height: 100vh; padding: 15px; }
        .container { max-width: 420px; margin: 0 auto; background: #111; border-radius: 20px; padding: 25px; border: 1px solid #1a3a4a; position: relative; }
        .lang-switch { position: absolute; top: 15px; right: 15px; display: flex; gap: 6px; }
        .lang-btn { padding: 4px 10px; border: 1px solid #2a4a5a; background: #1a2a3a; color: #5a8a9a; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }
        .brand-header { text-align: center; margin-bottom: 20px; padding-top: 20px; }
        .brand-logo {width: 100px; height: 100px; margin: 0 auto 10px; position: relative; background: #000; }
        .brand-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 0; background: none; }
        .brand-name { font-size: 24px; font-weight: 700; color: #00d4ff; text-shadow: 0 0 20px #00d4ff50; margin-bottom: 3px; }
        .brand-sub { font-size: 13px; color: #5a8a9a; }
        h2 { text-align: center; color: #00d4ff; margin-bottom: 20px; font-weight: 600; font-size: 18px; text-shadow: 0 0 10px #00d4ff30; }
        .info-card { background: #1a2a3a; border-radius: 14px; padding: 18px; margin: 15px 0; border: 1px solid #2a4a5a; }
        .info-card p { margin: 8px 0; font-size: 14px; color: #8ab4c4; }
        .info-card span { font-weight: 700; color: #00d4ff; }
        .form-group { margin: 15px 0; }
        .form-label { font-size: 14px; font-weight: 600; color: #00d4ff; display: block; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 14px; border: 2px solid #2a4a5a; border-radius: 12px; font-size: 15px; color: #fff; background: #1a2a3a; outline: none; transition: border-color 0.3s; }
        .form-input:focus { border-color: #00d4ff; }
        .duration-card { background: #1a2a3a; border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid #2a4a5a; }
        .duration-option { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin: 8px 0; background: #0a1520; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .duration-option:hover { border-color: #00d4ff; background: #1a3a4a; }
        .duration-option.selected { border-color: #00d4ff; background: #1a3a4a; box-shadow: 0 0 15px #00d4ff30; }
        .duration-text { font-size: 15px; font-weight: 600; color: #e0e0e0; }
        .price-text { font-size: 16px; font-weight: 700; color: #00d4ff; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #0088aa 100%); color: #000; box-shadow: 0 4px 15px #00d4ff40; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px #00d4ff50; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .loading { text-align: center; padding: 40px 20px; display: none; }
        .loading.active { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid #1a3a4a; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #5a8a9a; font-size: 14px; }
        .error-page { text-align: center; padding: 40px 20px; display: none; }
        .error-page.active { display: block; }
        .error-icon { font-size: 48px; margin-bottom: 15px; }
        .error-msg { font-size: 16px; color: #ff6b6b; font-weight: 600; }
        .port-grid { display: grid; gap: 8px; margin: 10px 0; }
        .port-grid.ports-2 { grid-template-columns: repeat(2, 1fr); }
        .port-grid.ports-10 { grid-template-columns: repeat(5, 1fr); }
        .port-item { padding: 10px 5px; background: #1a2a3a; border-radius: 10px; text-align: center; border: 2px solid #2a4a5a; cursor: pointer; transition: all 0.2s; }
        .port-item:hover { border-color: #00d4ff; background: #1a3a4a; }
        .port-item.selected { border-color: #00d4ff; background: #1a3a4a; box-shadow: 0 0 10px #00d4ff30; }
        .port-item.busy { opacity: 0.4; cursor: not-allowed; background: #2a1a1a; border-color: #4a2a2a; }
        .port-item.charging .port-num { color: #4caf50; }
        .port-item.charging .port-status { color: #4caf50; }
        .port-item .port-num { font-size: 16px; font-weight: 700; color: #00d4ff; }
        .port-item .port-status { font-size: 10px; color: #5a8a9a; margin-top: 3px; }
        .port-item.busy .port-num { color: #ff6b6b; }
        .port-item.busy .port-status { color: #ff6b6b; }
        .port-hint { font-size: 12px; color: #5a8a9a; text-align: center; margin-top: 8px; }
        .model-badge { display: inline-block; padding: 3px 10px; background: #1a3a4a; border-radius: 10px; font-size: 11px; color: #00d4ff; margin-left: 8px; }
            @media(max-width: 400px) { .container { padding: 12px; border-radius: 12px; } .brand-logo {width: 70px; height: 70px; background: #000; } .btn { min-height: 48px; } .form-input { font-size: 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('vi')" data-lang="vi">VI</button>
            <button class="lang-btn" onclick="setLang('zh')" data-lang="zh">CN</button>
            <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
        </div>
        <div class="brand-header">
            <div class="brand-logo">
                <img src="logo.png" alt="DX" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                <div style="display:none;width:100px;height:100px;align-items:center;justify-content:center;font-size:32px;color:#00d4ff;font-weight:bold;text-shadow:0 0 10px #00d4ff50;">DX</div>
            </div>
            <div class="brand-name" data-i18n="brandName">Blue Light</div>
            <div class="brand-sub" data-i18n="brandSub">Sac chia se · Di chuyen tien loi</div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p class="loading-text" data-i18n="loading">Dang tai thong tin tram sac...</p>
        </div>

        <!-- Error -->
        <div class="error-page" id="errorSection">
            <div class="error-icon">⚠️</div>
            <p class="error-msg" id="errorMsg" data-i18n="loadError">Tai thong tin tram sac that bai</p>
        </div>

        <!-- Main -->
        <div id="mainSection" style="display:none;">
            <h2 id="chargerTitle" data-i18n="chargerInfo">Thong tin tram sac</h2>

            <div class="info-card">
                <p><span data-i18n="chargerLabel">Tram sac:</span> <span id="chargerName">-</span><span class="model-badge" id="modelBadge">10 cong</span></p>
                <p><span data-i18n="operatorLabel">Nha van hanh:</span> <span id="merchantName">-</span></p>
                <p><span data-i18n="statusLabel">Trang thai thiet bi:</span> <span id="chargerStatus" style="color:#4caf50;">-</span></p>
            </div>

            <!-- Port selection -->
            <div class="form-group">
                <label class="form-label" data-i18n="selectPort">Chon cong sac:</label>
                <div class="port-grid" id="portGrid"></div>
                <div class="port-hint" id="portHint"></div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label class="form-label" data-i18n="phoneLabel">So dien thoai:</label>
                <input type="tel" class="form-input" id="phoneInput" data-i18n-placeholder="phonePlaceholder" placeholder="Nhap so dien thoai" maxlength="15">
            </div>

            <!-- Duration -->
            <div class="duration-card">
                <label class="form-label" data-i18n="durationLabel">Chon thoi gian sac:</label>
                <div class="duration-option selected" onclick="selectDuration(this, 180, 10000)">
                    <span class="duration-text">3 <span data-i18n="hours">gio</span></span>
                    <span class="price-text">10,000 VND</span>
                </div>
                <div class="duration-option" onclick="selectDuration(this, 360, 20000)">
                    <span class="duration-text">6 <span data-i18n="hours">gio</span></span>
                    <span class="price-text">20,000 VND</span>
                </div>
                <div class="duration-option" onclick="selectDuration(this, 540, 30000)">
                    <span class="duration-text">9 <span data-i18n="hours">gio</span></span>
                    <span class="price-text">30,000 VND</span>
                </div>
            </div>

            <button class="btn btn-primary" id="payBtn" onclick="submitOrder()" data-i18n="confirmPay">Xac nhan thanh toan</button>
        </div>
    </div>

    <script>
        // === 部署配置：把下面改成你的服务器公网IP或域名 ===
        const SERVER_URL = 'https://backend-bay-five-63.vercel.app';
        // ====================================================
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : SERVER_URL;

        let selectedPort = null;
        let selectedDuration = 180;
        let selectedAmount = 10000;
        let chargerData = null;
        let statusPollInterval = null;

        const i18n = {
            vi: {
                brandName: 'Đèn Xanh Nhỏ',
                brandSub: 'Sạc chia sẻ · Di chuyển tiện lợi',
                loading: 'Đang tải thông tin trạm sạc...',
                loadError: 'Tải thông tin trạm sạc thất bại',
                chargerInfo: 'Thông tin trạm sạc',
                chargerLabel: 'Trạm sạc:',
                operatorLabel: 'Nhà vận hành:',
                statusLabel: 'Trạng thái thiết bị:',
                online: 'Trực tuyến',
                offline: 'Ngoại tuyến',
                selectPort: 'Chọn cổng sạc:',
                portHint: 'Tổng cộng {count} cổng sạc, nhấn vào cổng trống để chọn',
                phoneLabel: 'Số điện thoại:',
                phonePlaceholder: 'Nhập số điện thoại',
                durationLabel: 'Chọn thời gian sạc:',
                hours: 'giờ',
                confirmPay: 'Xác nhận thanh toán',
                scanQR: 'Vui lòng quét mã QR trên trạm sạc',
                networkError: 'Không thể kết nối máy chủ, vui lòng kiểm tra mạng',
                enterPhone: 'Vui lòng nhập số điện thoại',
                selectPortAlert: 'Vui lòng chọn cổng sạc',
                creatingOrder: 'Đang tạo đơn hàng...',
                orderFailed: 'Tạo đơn hàng thất bại',
                retry: 'Lỗi mạng, vui lòng thử lại',
                idle: 'Trống',
                occupied: 'Đã chiếm dụng',
                charging: 'Đang sạc'
            },
            en: {
                brandName: 'Blue Light',
                brandSub: 'Shared Charging · Easy Travel',
                loading: 'Loading charger info...',
                loadError: 'Failed to load charger info',
                chargerInfo: 'Charger Info',
                chargerLabel: 'Charger:',
                operatorLabel: 'Operator:',
                statusLabel: 'Device Status:',
                online: 'Online',
                offline: 'Offline',
                selectPort: 'Select Port:',
                portHint: '{count} ports total, click an idle port to select',
                phoneLabel: 'Phone Number:',
                phonePlaceholder: 'Enter phone number',
                durationLabel: 'Select Duration:',
                hours: 'hours',
                confirmPay: 'Confirm Payment',
                scanQR: 'Please scan the QR code on the charger',
                networkError: 'Cannot connect to server, please check network',
                enterPhone: 'Please enter phone number',
                selectPortAlert: 'Please select a charging port',
                creatingOrder: 'Creating order...',
                orderFailed: 'Order creation failed',
                retry: 'Network error, please retry',
                idle: 'Idle',
                occupied: 'Occupied',
                charging: 'Charging'
            },
            zh: {
                brandName: '小蓝灯',
                brandSub: '共享充电 · 便捷出行',
                loading: '正在加载充电桩信息...',
                loadError: '加载充电桩信息失败',
                chargerInfo: '充电桩信息',
                chargerLabel: '充电桩：',
                operatorLabel: '运营商：',
                statusLabel: '设备状态：',
                online: '在线',
                offline: '离线',
                selectPort: '选择充电口：',
                portHint: '共{count}个充电口，点击空闲口选择',
                phoneLabel: '手机号：',
                phonePlaceholder: '请输入手机号',
                durationLabel: '选择充电时长：',
                hours: '小时',
                confirmPay: '确认支付',
                scanQR: '请扫描充电桩上的二维码',
                networkError: '无法连接服务器，请检查网络',
                enterPhone: '请输入手机号',
                selectPortAlert: '请选择充电口',
                creatingOrder: '正在创建订单...',
                orderFailed: '创建订单失败',
                retry: '网络错误，请重试',
                idle: '空闲',
                occupied: '已占用',
                charging: '充电中'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'vi';

        function t(key, vars) {
            let text = i18n[currentLang]?.[key] || i18n['en'][key] || key;
            if (vars) {
                Object.keys(vars).forEach(k => {
                    text = text.replace(new RegExp('{' + k + '}', 'g'), vars[k]);
                });
            }
            return text;
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            applyTranslations();
            if (chargerData) renderMainPage();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.dataset.i18n);
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.dataset.i18nPlaceholder);
            });
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                el.innerHTML = t(el.dataset.i18nHtml);
            });
        }

        window.onload = async function() {
            setLang(currentLang);
            const params = new URLSearchParams(window.location.search);
            const chargerId = params.get('charger') || params.get('station') || params.get('id');
            const portParam = params.get('port');

            if (!chargerId) {
                showError(t('scanQR'));
                return;
            }

            showLoading(true);
            await loadChargerStatus(chargerId, portParam);

            statusPollInterval = setInterval(() => {
                if (chargerData) loadChargerStatus(chargerId, portParam, true);
            }, 30000);
        };

        async function loadChargerStatus(chargerId, portParam, silent) {
            try {
                const resp = await fetch(`${API_BASE}/api/charger/${chargerId}/realtime-status`);
                const data = await resp.json();

                if (data.code !== 200) {
                    if (!silent) showError(data.msg || t('loadError'));
                    return;
                }

                chargerData = data.data;
                chargerData.id = chargerData.id || chargerId;
                document.getElementById('chargerTitle').textContent = chargerData.name;
                if (portParam && !selectedPort) selectedPort = parseInt(portParam);
                renderMainPage();
            } catch (err) {
                if (!silent) showError(t('networkError'));
            }
        }

        function showLoading(show) {
            document.getElementById('loadingSection').className = show ? 'loading active' : 'loading';
        }

        function showError(msg) {
            showLoading(false);
            document.getElementById('mainSection').style.display = 'none';
            document.getElementById('errorSection').className = 'error-page active';
            document.getElementById('errorMsg').textContent = msg;
        }

        function renderMainPage() {
            showLoading(false);
            document.getElementById('errorSection').className = 'error-page';
            document.getElementById('mainSection').style.display = 'block';

            document.getElementById('chargerName').textContent = chargerData.name;
            document.getElementById('merchantName').textContent = chargerData.merchant_name;

            const statusEl = document.getElementById('chargerStatus');
            if (chargerData.platform_online === true) {
                statusEl.textContent = t('online');
                statusEl.style.color = '#4caf50';
            } else if (chargerData.platform_online === false) {
                statusEl.textContent = t('offline');
                statusEl.style.color = '#ff6b6b';
            } else {
                statusEl.textContent = chargerData.status === 'online' ? t('online') : t('offline');
                statusEl.style.color = chargerData.status === 'online' ? '#4caf50' : '#ff6b6b';
            }

            const portCount = chargerData.port_count || chargerData.ports?.length || 10;
            const modelText = portCount <= 2 ? '2 ' + t('ports') : '10 ' + t('ports');
            document.getElementById('modelBadge').textContent = modelText;

            const grid = document.getElementById('portGrid');
            grid.innerHTML = '';
            grid.className = portCount <= 2 ? 'port-grid ports-2' : 'port-grid ports-10';

            chargerData.ports.forEach(p => {
                const div = document.createElement('div');
                const isCharging = p.status === 'charging';
                const isBusy = isCharging || p.status === 'fault';
                const isSelected = p.port_number === selectedPort;
                div.className = `port-item${isBusy ? ' busy' : ''}${isCharging ? ' charging' : ''}${isSelected ? ' selected' : ''}`;
                div.innerHTML = `
                    <div class="port-num">${p.port_number}</div>
                    <div class="port-status">${isCharging ? t('charging') : (isBusy ? t('occupied') : t('idle'))}</div>
                `;
                if (!isBusy) {
                    div.onclick = () => selectPort(div, p.port_number);
                }
                grid.appendChild(div);
            });

            document.getElementById('portHint').textContent = t('portHint', { count: portCount });

            const defaultSelected = document.querySelector('.duration-option.selected');
            if (defaultSelected) {
                const onclickStr = defaultSelected.getAttribute('onclick');
                const match = onclickStr.match(/selectDuration\(this,\s*(\d+),\s*(\d+)\)/);
                if (match) {
                    selectedDuration = parseInt(match[1]);
                    selectedAmount = parseInt(match[2]);
                }
            }
        }

        function selectPort(el, portNum) {
            document.querySelectorAll('.port-item').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            selectedPort = portNum;
        }

        function selectDuration(el, duration, amount) {
            document.querySelectorAll('.duration-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedDuration = duration;
            selectedAmount = amount;
        }

        async function submitOrder() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) { alert(t('enterPhone')); return; }
            if (!selectedPort) { alert(t('selectPortAlert')); return; }

            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = t('creatingOrder');

            try {
                const resp = await fetch(`${API_BASE}/api/order/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        charger_id: chargerData.id,
                        port_number: selectedPort,
                        phone: phone,
                        duration: selectedDuration,
                        amount: selectedAmount
                    })
                });
                const data = await resp.json();

                if (data.code === 200) {
                    const orderNo = data.data.order_no;
                    window.location.href = `payment.html?order_no=${orderNo}&amount=${selectedAmount}&charger=${encodeURIComponent(chargerData.name)}&port=${selectedPort}&duration=${selectedDuration}&charger_id=${chargerData.id}`;
                } else {
                    alert(data.msg || t('orderFailed'));
                    btn.disabled = false;
                    btn.textContent = t('confirmPay');
                }
            } catch (err) {
                alert(t('retry'));
                btn.disabled = false;
                btn.textContent = t('confirmPay');
            }
        }

        i18n.vi.ports = 'cổng';
        i18n.en.ports = 'ports';
    </script>
</body>
</html>
