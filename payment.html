<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>主控监听 - 自动充电</title>
    <style>
        body{background:#111;color:#0f0;font-family: monospace;padding:20px;font-size:16px;}
        .log{margin:10px 0;padding:10px;background:#222;border-radius:6px;}
    </style>
</head>
<body>
    <h2>🔌 充电桩自动监听主控（电脑保持打开）</h2>
    <div id="log"></div>

<script>
    // 充电桩配置
    const CHARGER_CONFIG = {
        "01": { id: "79490", cd: "862741082710969" }
    };

    const API_URL = "https://cdz.xiaoyouwulian.com/web-wechart/agent/charge/equipment/net/remote/net/remote/send";
    const TOKEN = "fc50d8c9-736b-4f09-b731-1ee69f2d4f59";

    // 页面加载自动执行
    window.onload = function() {
        const url = new URLSearchParams(location.search);
        const station = url.get('station');
        const plug = url.get('plug');
        const duration = url.get('duration');

        if(!station || !plug || !duration) {
            addLog("✅ 监听已启动，等待用户支付...");
            return;
        }

        addLog("📥 收到订单: 桩"+station+" 插头"+plug+" 时长"+duration+"分钟");
        sendCharge({station, plug, duration});
    }

    function sendCharge(order){
        const charger = CHARGER_CONFIG[order.station];
        if(!charger){ addLog("❌ 设备未配置"); return; }

        const formData = new FormData();
        formData.append('id', charger.id);
        formData.append('cd', charger.cd);
        formData.append('port', order.plug);
        formData.append('time', order.duration);
        formData.append('token', TOKEN);

        fetch(API_URL, { method: 'POST', body: formData, credentials: 'include' })
        .then(() => {
            addLog("✅ 指令发送成功 → 充电桩已启动！");
            // ✅ 发送成功后自动关闭窗口，不留痕迹
            setTimeout(() => window.close(), 1000);
        })
        .catch(e => {
            addLog("❌ 发送失败："+e);
        });
    }

    function addLog(msg){
        const d = document.createElement("div");
        d.className = "log";
        d.innerText = new Date().toLocaleString() + " | " + msg;
        document.getElementById("log").prepend(d);
    }
</script>
</body>
</html>
