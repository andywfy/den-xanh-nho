<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Đèn Xanh Nhỏ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 150, 136, 0.2);
            padding: 25px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 100px;
            height: 70px;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .conical-hat {
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            top: 0;
        }

        .hat-brim {
            width: 110px;
            height: 10px;
            background: linear-gradient(135deg, #0097a7 0%, #00796b 100%);
            position: absolute;
            bottom: 0;
            border-radius: 50%;
        }

        .brand-logo span {
            color: white;
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            position: relative;
            z-index: 1;
            margin-top: -10px;
            letter-spacing: 2px;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            color: #0097a7;
            margin-bottom: 5px;
        }

        .brand-name-en {
            font-size: 14px;
            color: #00bcd4;
            font-weight: 500;
            margin-top: 3px;
        }

        .lang-switch {
            text-align: right;
            margin-bottom: 15px;
        }

        .lang-btn {
            padding: 5px 12px;
            border: 2px solid #00bcd4;
            background: white;
            color: #0097a7;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 3px;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
        }

        h2 {
            text-align: center;
            color: #006064;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 22px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
        }

        .info-card {
            background: #e0f7fa;
            border-radius: 14px;
            padding: 20px;
            margin: 20px 0;
            border-left: 5px solid #00bcd4;
        }

        .info-card p {
            margin: 12px 0;
            font-size: 15px;
            color: #006064;
        }

        .amount {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #0097a7;
            margin: 20px 0;
        }

        .qr-box {
            border: 3px dashed #00bcd4;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            background: #f8f9fa;
            margin: 20px 0;
            font-size: 16px;
            color: #00796b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="switchLang('vi')">Tiếng Việt</button>
            <button class="lang-btn" onclick="switchLang('en')">English</button>
            <button class="lang-btn" onclick="switchLang('zh')">中文</button>
        </div>

        <div class="brand-header">
            <div class="brand-logo">
                <div class="conical-hat"></div>
                <div class="hat-brim"></div>
                <span>ĐX</span>
            </div>
            <div class="brand-name" id="brandName">Đèn Xanh Nhỏ</div>
            <div class="brand-name-en" id="brandNameEn">Little Blue Light</div>
        </div>

        <h2 id="pageTitle">Thanh toán</h2>

        <div class="info-card">
            <p id="stationLabel">Trạm sạc：<span id="station">01</span></p>
            <p id="plugLabel">Phích cắm：<span id="plug">1</span></p>
            <p id="timeLabel">Thời gian：<span id="duration">3 giờ</span></p>
        </div>

        <div class="amount" id="amount">10.000 VND</div>

        <div class="qr-box" id="qrText">Mã QR thanh toán</div>

        <button class="btn btn-primary" onclick="checkAndStart()" id="actionBtn">Kiểm tra thanh toán và bắt đầu sạc</button>
    </div>

    <script>
        const texts = {
            vi: {
                brandName: "Đèn Xanh Nhỏ", brandNameEn: "Little Blue Light", pageTitle: "Thanh toán",
                stationLabel: "Trạm sạc：", plugLabel: "Phích cắm：", timeLabel: "Thời gian：",
                qrText: "Mã QR thanh toán", actionBtn: "Kiểm tra thanh toán và bắt đầu sạc"
            },
            en: {
                brandName: "Little Blue Light", brandNameEn: "Đèn Xanh Nhỏ", pageTitle: "Payment",
                stationLabel: "Station：", plugLabel: "Plug：", timeLabel: "Duration：",
                qrText: "Payment QR Code", actionBtn: "Check payment and start charging"
            },
            zh: {
                brandName: "小蓝灯", brandNameEn: "Little Blue Light", pageTitle: "支付",
                stationLabel: "充电桩：", plugLabel: "插头：", timeLabel: "时长：",
                qrText: "支付二维码", actionBtn: "检查支付并开始充电"
            }
        };

        let currentLang = 'vi';
        let order = {};

        window.onload = function() {
            const url = new URLSearchParams(location.search);
            order = {
                station: url.get('station') || '01',
                plug: url.get('plug') || '1',
                duration: url.get('duration') || 180,
                amount: url.get('amount') || 10000
            };
            switchLang('vi');
        };

        function renderAll() {
            const t = texts[currentLang];
            document.getElementById('station').innerText = order.station;
            document.getElementById('plug').innerText = order.plug;
            document.getElementById('amount').innerText = parseInt(order.amount).toLocaleString() + ' VND';

            const hour = Math.round(order.duration / 60);
            let durationText = currentLang === 'vi' ? hour + ' giờ' :
                              currentLang === 'en' ? hour + ' hours' : hour + '小时';
            document.getElementById('duration').innerText = durationText;

            document.getElementById('stationLabel').innerText = t.stationLabel + ' ' + order.station;
            document.getElementById('plugLabel').innerText = t.plugLabel + ' ' + order.plug;
            document.getElementById('timeLabel').innerText = t.timeLabel + ' ' + durationText;
            document.getElementById('qrText').innerText = t.qrText;
            document.getElementById('actionBtn').innerText = t.actionBtn;
        }

        function switchLang(lang) {
            currentLang = lang;
            const t = texts[lang];

            document.getElementById('brandName').innerText = t.brandName;
            document.getElementById('brandNameEn').innerText = t.brandNameEn;
            document.getElementById('pageTitle').innerText = t.pageTitle;

            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            renderAll();
        }

        function checkAndStart() {
            setTimeout(() => {
                location.href = `index.html?station=${order.station}&paid=true&duration=${order.duration}`;
            }, 1500);
        }
    </script>
</body>
</html>
