<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Đèn Xanh Nhỏ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 420px; margin: 0 auto; background: white; border-radius: 20px; padding: 25px; }
        .lang-switch { text-align: right; margin-bottom: 15px; }
        .lang-btn { padding: 5px 12px; border: 2px solid #00bcd4; background: white; color: #0097a7; border-radius: 15px; font-size: 12px; cursor: pointer; }
        .info-card { background: #e0f7fa; border-radius: 14px; padding: 20px; margin: 20px 0; }
        .amount { font-size: 32px; font-weight: bold; text-align: center; color: #0097a7; margin: 20px 0; }
        .qr-box { border: 3px dashed #00bcd4; padding: 30px; border-radius: 15px; text-align: center; background: #f8f9fa; margin: 20px 0; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%); color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>
    <h2 id="title">Thanh toán</h2>
    <div class="info-card">
        <p id="t_station">Trạm sạc: <span id="station">01</span></p>
        <p id="t_plug">Phích cắm: <span id="plug">1</span></p>
        <p id="t_time">Thời gian: <span id="duration">3 giờ</span></p>
    </div>
    <div class="amount" id="amount">10000 VND</div>
    <div class="qr-box" id="qr">Mã QR thanh toán</div>
    <button class="btn" onclick="sendOrder()" id="startBtn">Bắt đầu sạc</button>
</div>

<script>
    const order = new URLSearchParams(location.search);
    const station = order.get('station')||'01';
    const plug = order.get('plug')||'1';
    const duration = order.get('duration')||'180';

    const texts = {
        vi:{title:"Thanh toán",station:"Trạm sạc",plug:"Phích cắm",time:"Thời gian",qr:"Mã QR",btn:"Bắt đầu sạc"},
        en:{title:"Payment",station:"Station",plug:"Plug",time:"Duration",qr:"QR Code",btn:"Start charging"},
        zh:{title:"支付",station:"充电桩",plug:"插头",time:"时长",qr:"支付二维码",btn:"检查支付并开始充电"}
    };

    let lang='vi';
    function setLang(l){lang=l;const t=texts[lang];
        document.getElementById('title').innerText=t.title;
        document.getElementById('t_station').innerText=t.station+': '+station;
        document.getElementById('t_plug').innerText=t.plug+': '+plug;
        document.getElementById('t_time').innerText=t.time+': '+Math.round(duration/60)+' giờ';
        document.getElementById('qr').innerText=t.qr;
        document.getElementById('startBtn').innerText=t.btn;
    }

    function sendOrder(){
        localStorage.setItem("CHARGE_ORDER", JSON.stringify({
            station:station, plug:plug, duration:duration, time:new Date().getTime()
        }));
        alert("Đã gửi lệnh! Máy sẽ tự sạc!");
        location.href=`index.html?station=${station}&paid=true&duration=${duration}`;
    }

    setLang('vi');
</script>
</body>
</html>
